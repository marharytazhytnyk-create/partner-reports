name: Marharyta Portfolio — Weekly Report

on:
  schedule:
    - cron: '0 11 * * 1'   # Щопонеділка 14:00 EEST (UTC+3 = 11:00 UTC)
  workflow_dispatch:         # Ручний запуск

permissions:
  contents: write

jobs:
  generate:
    name: Generate & Push Portfolio Report
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests pandas

      - name: Generate Marharyta Portfolio HTML report
        env:
          DATABRICKS_HOST:       ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN:      ${{ secrets.DATABRICKS_TOKEN }}
          DATABRICKS_CLUSTER_ID: ${{ secrets.DATABRICKS_CLUSTER_ID }}
        run: python Marharyta_Portfolio/generate_portfolio_report.py

      - name: Commit and push report
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "Marharyta_Portfolio/"
          git diff --staged --quiet || git commit -m "📊 Marharyta Portfolio — $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push

      - name: Send Red Flag email notifications (TEST MODE)
        env:
          DATABRICKS_HOST:       ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN:      ${{ secrets.DATABRICKS_TOKEN }}
          DATABRICKS_CLUSTER_ID: ${{ secrets.DATABRICKS_CLUSTER_ID }}
          GMAIL_USER:            ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:    ${{ secrets.GMAIL_APP_PASSWORD }}
          AM_EMAIL:              ${{ secrets.AM_EMAIL }}
          TEST_MODE: "true"
        run: python Marharyta_Portfolio/send_red_flag_emails.py
        continue-on-error: true   # не блокує workflow якщо email не налаштовано
