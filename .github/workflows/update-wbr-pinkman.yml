name: Update WBR Reports (Pinkman / Bella Mozzarella)

on:
  schedule:
    # 14:00 Kyiv (EEST, UTC+3) every Monday
    - cron: '0 11 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-wbr-pinkman:
    name: WBR Pinkman & Bella Mozzarella
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Generate WBR reports
        env:
          DATABRICKS_HOST:       ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN:      ${{ secrets.DATABRICKS_TOKEN }}
          DATABRICKS_CLUSTER_ID: ${{ secrets.DATABRICKS_CLUSTER_ID }}
        run: python "WBR PINKMAN/generate_wbr_pinkman.py"

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "WBR PINKMAN/"
          git diff --staged --quiet || git commit -m "📊 WBR Pinkman / Bella Mozzarella — $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
