<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Partner Reports</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d1117;
      color: #e6edf3;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }
    .logo {
      font-size: 3rem;
      margin-bottom: 1.5rem;
    }
    h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      background: linear-gradient(135deg, #58a6ff, #bc8cff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p {
      color: #8b949e;
      font-size: 1.1rem;
      max-width: 480px;
      line-height: 1.6;
    }
    .badge {
      margin-top: 2rem;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 2rem;
      padding: 0.5rem 1.25rem;
      font-size: 0.875rem;
      color: #8b949e;
    }
    .dot {
      width: 8px; height: 8px;
      background: #3fb950;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
  </style>
</head>
<body>
  <div class="logo">📊</div>
  <h1>Partner Reports</h1>
  <p>Автоматичні тижневі звіти по партнерах з актуальними даними з Databricks.</p>
  <div style="margin-top:2rem;display:flex;flex-direction:column;gap:.75rem;align-items:center">
    <a href="providers/" style="
      display:inline-flex;align-items:center;gap:.6rem;
      background:#161b22;border:1px solid #30363d;border-radius:10px;
      padding:.75rem 1.5rem;color:#58a6ff;text-decoration:none;
      font-weight:600;font-size:1rem;transition:border-color .2s
    ">
      🏪 Provider Report — Orders &amp; Availability
    </a>
  </div>
  <div class="badge" style="margin-top:1.5rem">
    <div class="dot"></div>
    Автооновлення кожен понеділок о 13:00 UTC
  </div>
</body>
</html>
