<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Карта івенту — Партнери України</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
/* ── Base ──────────────────────────────────────────────────────── */
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:'Segoe UI',Arial,sans-serif;overflow:hidden}

/* ── Layout ────────────────────────────────────────────────────── */
#app{display:flex;height:100vh;position:relative}

/* ── Sidebar ───────────────────────────────────────────────────── */
#sidebar{
  width:280px;min-width:280px;
  height:100vh;display:flex;flex-direction:column;
  background:#ffffff;border-right:1px solid #dde1e7;
  box-shadow:2px 0 10px rgba(0,0,0,.1);
  transition:width .3s ease,min-width .3s ease;
  overflow:hidden;z-index:600;flex-shrink:0;
}
#sidebar.collapsed{width:0;min-width:0}

body.dark #sidebar{background:#1a1a2e;border-color:#2d2d40;color:#d0d0e0}

#sidebar-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px;border-bottom:1px solid #dde1e7;
  background:#f4f6fa;white-space:nowrap;min-width:280px;
  position:sticky;top:0;z-index:1;
}
body.dark #sidebar-head{background:#252540;border-color:#2d2d40}

#sidebar-title{font-weight:700;font-size:14px;color:#1a2235}
body.dark #sidebar-title{color:#e0e0f0}

#close-sb{
  background:none;border:none;cursor:pointer;
  font-size:16px;padding:4px 6px;border-radius:6px;
  color:#666;transition:background .2s;
}
#close-sb:hover{background:#e4e6ea}
body.dark #close-sb{color:#aaa}
body.dark #close-sb:hover{background:#333}

#sidebar-body{flex:1;overflow-y:auto;padding:6px 0;min-width:280px}
#sidebar-body::-webkit-scrollbar{width:5px}
#sidebar-body::-webkit-scrollbar-thumb{background:#c0c4cc;border-radius:3px}
body.dark #sidebar-body::-webkit-scrollbar-thumb{background:#444}

/* ── City items ────────────────────────────────────────────────── */
.city-block{border-bottom:1px solid #f0f2f5}
body.dark .city-block{border-color:#26263a}

.city-row{
  display:flex;align-items:center;gap:8px;
  padding:10px 14px;cursor:pointer;
  transition:background .15s;user-select:none;
}
.city-row:hover{background:#eef1f7}
body.dark .city-row:hover{background:#222236}

.city-arrow{font-size:11px;color:#888;transition:transform .2s;width:12px;text-align:center}
.city-arrow.open{transform:rotate(90deg)}

.city-name-text{flex:1;font-size:13px;font-weight:600;color:#2c3e50;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
body.dark .city-name-text{color:#c8d0e0}

.city-status{
  font-size:10px;font-weight:700;padding:2px 7px;
  border-radius:10px;white-space:nowrap;flex-shrink:0;
}
.st-full{background:#d4edda;color:#155724}
.st-partial{background:#fff3cd;color:#856404}
.st-none{background:#f8d7da;color:#721c24}

.zone-list{display:none;padding-left:0}
.zone-list.visible{display:block}

.zone-row{
  display:flex;align-items:center;gap:8px;
  padding:7px 14px 7px 32px;cursor:pointer;
  font-size:12px;color:#4a5568;
  transition:background .15s;
}
.zone-row:hover{background:#eef1f7}
body.dark .zone-row:hover{background:#222236}
body.dark .zone-row{color:#9aa8c0}

.zone-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.zone-dot.ok{background:#29b6f6}
.zone-dot.no{background:#ef5350}

/* ── Open-sidebar button ───────────────────────────────────────── */
#open-sb-btn{
  position:fixed;top:16px;left:16px;z-index:9998;
  width:42px;height:42px;border-radius:10px;border:none;
  background:#fff;cursor:pointer;font-size:20px;
  box-shadow:0 3px 12px rgba(0,0,0,.25);
  display:none;align-items:center;justify-content:center;
  transition:background .2s;
}
#open-sb-btn.visible{display:flex}
body.dark #open-sb-btn{background:#2a2a40;color:#eee}
#open-sb-btn:hover{background:#f0f0f0}
body.dark #open-sb-btn:hover{background:#333350}

/* ── Map container ─────────────────────────────────────────────── */
#map-wrap{flex:1;position:relative;overflow:hidden}
#map{width:100%;height:100%}

/* ── Right panel ───────────────────────────────────────────────── */
#right-panel{
  position:fixed;top:16px;right:16px;z-index:9999;
  display:flex;flex-direction:column;align-items:flex-end;gap:10px;
  max-width:260px;
}

#theme-btn{
  width:48px;height:48px;border-radius:50%;border:none;
  cursor:pointer;font-size:24px;line-height:1;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 3px 12px rgba(0,0,0,.25);
  background:#fff;transition:background .3s;
}
body.dark #theme-btn{background:#2a2a40}

#legend{
  background:rgba(255,255,255,.97);backdrop-filter:blur(6px);
  border-radius:14px;padding:14px 16px;
  box-shadow:0 4px 18px rgba(0,0,0,.16);
  min-width:220px;font-size:13px;line-height:1.6;
}
body.dark #legend{background:rgba(22,22,38,.97);color:#d0d0e0}

#legend h4{font-size:14px;font-weight:700;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid rgba(0,0,0,.08)}
body.dark #legend h4{border-color:rgba(255,255,255,.1)}

.leg-row{display:flex;align-items:center;gap:10px;margin-bottom:7px}
.leg-sw{width:22px;height:13px;border-radius:4px;flex-shrink:0}
.leg-sw.circle{border-radius:50%;width:14px;height:14px}
#stats{font-size:12px;margin-top:8px;padding-top:8px;border-top:1px solid rgba(0,0,0,.08);opacity:.75;line-height:1.9}
body.dark #stats{border-color:rgba(255,255,255,.1)}

/* ── Action buttons ────────────────────────────────────────────── */
.act-btn{
  display:flex;align-items:center;gap:7px;
  padding:9px 14px;border-radius:10px;border:none;cursor:pointer;
  font-size:12px;font-weight:600;white-space:nowrap;
  box-shadow:0 3px 10px rgba(0,0,0,.18);
  transition:all .2s;width:100%;text-align:left;
}
.act-btn:hover{transform:translateY(-1px);box-shadow:0 5px 14px rgba(0,0,0,.22)}
.act-btn.red-btn{background:#fff;color:#c0392b}
body.dark .act-btn.red-btn{background:#2a1a1a;color:#ef7c7c}
.act-btn.city-btn{background:#fff;color:#2980b9}
body.dark .act-btn.city-btn{background:#1a1a2e;color:#7fc0f0}
.act-btn.radius-btn{background:#fff;color:#27ae60}
body.dark .act-btn.radius-btn{background:#1a2a1a;color:#6fcf8a}
.act-btn.radius-off{color:#e74c3c}
body.dark .act-btn.radius-off{color:#f08080}
.act-btn.update-btn{background:#fff;color:#16a085}
body.dark .act-btn.update-btn{background:#1a2a1e;color:#6fcf97}
.act-btn[disabled]{opacity:.7;cursor:not-allowed;transform:none!important;box-shadow:0 3px 10px rgba(0,0,0,.18)}

.sub-panel{
  background:rgba(255,255,255,.98);backdrop-filter:blur(8px);
  border-radius:12px;padding:10px;
  box-shadow:0 4px 18px rgba(0,0,0,.16);
  max-height:280px;overflow-y:auto;
  width:100%;display:none;
}
.sub-panel.open{display:block}
body.dark .sub-panel{background:rgba(20,20,35,.98);color:#d0d0e0}
.sub-panel::-webkit-scrollbar{width:4px}
.sub-panel::-webkit-scrollbar-thumb{background:#ccc;border-radius:2px}

.sub-panel-title{font-size:12px;font-weight:700;color:#888;margin-bottom:6px;padding-bottom:6px;border-bottom:1px solid #eee;text-transform:uppercase;letter-spacing:.5px}
body.dark .sub-panel-title{color:#666;border-color:#333}

.sub-item{
  display:flex;align-items:center;gap:8px;
  padding:6px 8px;border-radius:7px;
  font-size:12px;cursor:pointer;transition:background .15s;
}
.sub-item:hover{background:#f5f5f5}
body.dark .sub-item:hover{background:#252535}
.sub-item-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* ── Popup styles ───────────────────────────────────────────────── */
.leaflet-popup-content-wrapper{border-radius:12px;box-shadow:0 6px 24px rgba(0,0,0,.2);padding:0}
.leaflet-popup-content{margin:0}
.pop-wrap{padding:14px 16px;min-width:200px}
.pop-title{font-weight:700;font-size:15px;margin-bottom:8px;color:#1a2235;border-bottom:2px solid #e8ecf0;padding-bottom:6px}
.pop-row{font-size:13px;color:#4a5568;margin-bottom:4px}
.pop-row b{color:#1a2235}
.pop-badge{display:inline-block;margin-top:6px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.badge-ok{background:#d4edda;color:#155724}
.badge-no{background:#f8d7da;color:#721c24}

/* ── Tooltip ────────────────────────────────────────────────────── */
.leaflet-tooltip{border-radius:8px;font-size:12px;font-weight:600;padding:4px 10px;white-space:nowrap;pointer-events:none}

/* ── Highlight flash ────────────────────────────────────────────── */
@keyframes flash{0%,100%{opacity:1}50%{opacity:.4}}
/* ── Easter layer ───────────────────────────────────────────────── */
.act-btn.easter-on{background:#fff3e0;color:#e65100}
.act-btn.easter-off{color:#999}
</style>
</head>
<body>

<!-- Open-sidebar floating button -->
<button id="open-sb-btn" onclick="openSidebar()" title="Відкрити панель міст">☰</button>

<div id="app">
  <!-- ── SIDEBAR ── -->
  <aside id="sidebar">
    <div id="sidebar-head">
      <span id="sidebar-title">🗺️ Міста та зони</span>
      <button id="close-sb" onclick="closeSidebar()" title="Закрити">✕</button>
    </div>
    <div id="sidebar-body"><!-- filled by JS --></div>
  </aside>

  <!-- ── MAP ── -->
  <div id="map-wrap">
    <div id="map"></div>
  </div>
</div>

<!-- ── RIGHT PANEL ── -->
<div id="right-panel">
  <button id="theme-btn" onclick="toggleTheme()" title="Перемкнути тему">🌙</button>

  <div id="legend">
    <h4>🗺️ Легенда</h4>
    <div class="leg-row"><div class="leg-sw" style="background:rgba(41,182,246,.38);border:2px solid #0288d1"></div><span>Зона з партнерами</span></div>
    <div class="leg-row"><div class="leg-sw" style="background:rgba(239,83,80,.42);border:2px solid #c62828"></div><span>Зона без покриття</span></div>
    <div class="leg-row"><div class="leg-sw circle" style="background:rgba(102,187,106,.22);border:2px solid #43a047"></div><span>Радіус доставки</span></div>
    <div class="leg-row"><div class="leg-sw circle" style="background:#1565c0;border:2px solid #0d47a1"></div><span>Локація партнера</span></div>
    <div class="leg-row"><div class="leg-sw circle" style="background:#e65100;border:2px solid #bf360c"></div><span>🐣 Easter 2026 (ua-easter-2026)</span></div>
    <div id="stats"></div>
  </div>

  <!-- Radius toggle -->
  <div style="width:100%">
    <button class="act-btn radius-btn" id="radius-btn" onclick="toggleRadius()">
      👁 Радіуси доставки: <b>Вкл</b>
    </button>
  </div>

  <!-- Zones without coverage -->
  <div style="width:100%">
    <button class="act-btn red-btn" onclick="togglePanel('zones-panel')">
      🔴 Зони без покриття&nbsp;(<span id="uc-zones-cnt">0</span>)
    </button>
    <div class="sub-panel" id="zones-panel">
      <div class="sub-panel-title">Зони без покриття</div>
      <div id="zones-panel-list"></div>
    </div>
  </div>

  <!-- Cities without coverage -->
  <div style="width:100%">
    <button class="act-btn city-btn" onclick="togglePanel('cities-panel')">
      🏙 Міста без покриття&nbsp;(<span id="uc-cities-cnt">0</span>)
    </button>
    <div class="sub-panel" id="cities-panel">
      <div class="sub-panel-title">Міста без покриття</div>
      <div id="cities-panel-list"></div>
    </div>
  </div>

  <!-- Refresh button -->
  <div style="width:100%">
    <button class="act-btn update-btn" id="refresh-btn" onclick="refreshData()">
      🔄 Оновити дані
    </button>
    <div id="refresh-status" style="font-size:11px;color:#888;text-align:right;padding:2px 4px;display:none"></div>
  </div>

  <!-- Easter partners toggle -->
  <div style="width:100%">
    <button class="act-btn" id="easter-btn" onclick="toggleEaster()"
      style="background:#fff;color:#e65100">
      🐣 Партнери Easter 2026: <b>Вкл</b>
    </button>
    <div style="font-size:10px;color:#888;text-align:right;padding:2px 4px" id="easter-count-label"></div>
  </div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

function parsePoly(s){
  return s.split(',').map(pair=>{
    const p=pair.trim().split(/\s+/).filter(Boolean);
    if(p.length<2)return null;
    const lat=parseFloat(p[0]),lng=parseFloat(p[1]);
    return(isNaN(lat)||isNaN(lng))?null:[lat,lng];
  }).filter(Boolean);
}
function centroid(coords){
  return[coords.reduce((a,c)=>a+c[0],0)/coords.length,
         coords.reduce((a,c)=>a+c[1],0)/coords.length];
}
function haversineKm(lat1,lng1,lat2,lng2){
  const R=6371,dLat=(lat2-lat1)*Math.PI/180,dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function extractCity(name){
  const n=name.replace(/^Ckerkasy/,'Cherkasy');
  const i=n.indexOf(' - ');
  return i>0?n.substring(0,i):n;
}
function getDisplayName(name,city){
  const prefixes=[city+' - ','Ckerkasy - '];
  for(const p of prefixes)if(name.startsWith(p))return name.substring(p.length);
  return name;
}

// Build partners
let partners=PARTNERS_RAW.map(p=>({name:p[0],city:p[1],zone:p[2].trim(),lat:p[3],lng:p[4],r:p[5]}));

function normalizeZoneName(s){
  return s.toLowerCase()
    .replace(/malynovs[''ʼ]?ka/g,'malinovska')
    .replace(/\s+/g,' ').trim();
}
function isCovered(zoneName, cen){
  const zn=normalizeZoneName(zoneName);
  // 1) Name-based match (exact or prefix)
  if(partners.some(p=>{
    const pz=normalizeZoneName(p.zone);
    return pz===zn || zn.startsWith(pz+' ') || zn.startsWith(pz+',');
  })) return true;
  // 2) Geographic fallback: any partner whose delivery radius covers the zone centroid
  if(cen){
    return partners.some(p=>haversineKm(cen[0],cen[1],p.lat,p.lng)<=p.r);
  }
  return false;
}

//  MAP SETUP
// ═══════════════════════════════════════════════════════
let isDark=false;
const lightTiles=L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{attribution:'&copy; OSM &copy; CARTO',maxZoom:19});
const darkTiles=L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{attribution:'&copy; OSM &copy; CARTO',maxZoom:19});
const map=L.map('map',{center:[49.0,31.5],zoom:6,layers:[lightTiles],zoomControl:true});

//  PROCESS ZONES → build zoneData + cityData
// ═══════════════════════════════════════════════════════
const zoneData=[];    // [{name,displayName,city,coords,polygon,covered,centroid,bounds,fillColor,fillOpacity,borderColor}]
const cityData={};    // {cityName:{zones:[],bounds,anyCovered,allUncovered}}
const zoneLayer=L.layerGroup().addTo(map);

ZONES_RAW.forEach(([name,polyStr])=>{
  const coords=parsePoly(polyStr);
  if(!coords||coords.length<3)return;
  const cen=centroid(coords);
  const covered=isCovered(name,cen);
  const bounds=L.latLngBounds(coords);
  const city=extractCity(name);
  const displayName=getDisplayName(name,city);

  const fillColor=covered?'#29b6f6':'#ef5350';
  const borderColor=covered?'#0277bd':'#b71c1c';
  const fillOpacity=covered?0.28:0.42;

  const polygon=L.polygon(coords,{color:borderColor,weight:1.5,fillColor,fillOpacity,smoothFactor:1});

  const popupHTML=`<div class="pop-wrap">
    <div class="pop-title">📍 ${name}</div>
    <div class="pop-row"><b>Місто:</b> ${city}</div>
    <div class="pop-row"><b>Центр зони:</b> ${cen[0].toFixed(4)}, ${cen[1].toFixed(4)}</div>
    <span class="pop-badge ${covered?'badge-ok':'badge-no'}">${covered?'✅ Є партнери / покриття':'❌ Без покриття'}</span>
  </div>`;
  polygon.bindPopup(popupHTML,{maxWidth:300});
  polygon.bindTooltip(name,{sticky:true,direction:'top',opacity:0.9});
  polygon.addTo(zoneLayer);

  const zObj={name,displayName,city,coords,polygon,covered,centroid:cen,bounds,fillColor,fillOpacity,borderColor};
  zoneData.push(zObj);

  if(!cityData[city]){
    cityData[city]={zones:[],bounds:L.latLngBounds(coords.slice()),anyCovered:false};
  }else{
    cityData[city].bounds.extend(bounds);
  }
  cityData[city].zones.push(zObj);
  if(covered)cityData[city].anyCovered=true;
});

// Compute allUncovered per city
Object.values(cityData).forEach(c=>{c.allUncovered=!c.anyCovered;});

function buildSidebar(){
  const body=document.getElementById('sidebar-body');
  const cities=Object.keys(cityData).sort((a,b)=>a.localeCompare(b));
  let html='';
  cities.forEach(city=>{
    const cd=cityData[city];
    const covCount=cd.zones.filter(z=>z.covered).length;
    const total=cd.zones.length;
    let statusCls,statusTxt;
    if(covCount===total){statusCls='st-full';statusTxt='✅ Всі';}
    else if(covCount>0){statusCls='st-partial';statusTxt=`⚠ ${covCount}/${total}`;}
    else{statusCls='st-none';statusTxt='❌ 0';}

    const cid='city-'+city.replace(/\s+/g,'_').replace(/[^a-zA-Z0-9_]/g,'');
    html+=`<div class="city-block">
      <div class="city-row" data-cid="${cid}" data-city-nav="${city.replace(/"/g,'&quot;')}">
        <span class="city-arrow" id="arr-${cid}">▶</span>
        <span class="city-name-text">${city}</span>
        <span class="city-status ${statusCls}">${statusTxt}</span>
      </div>
      <div class="zone-list" id="${cid}">`;
    cd.zones.forEach((z,idx)=>{
      html+=`<div class="zone-row" data-zone-name="${z.name.replace(/"/g,'&quot;')}">
        <div class="zone-dot ${z.covered?'ok':'no'}"></div>
        <span>${z.displayName}</span>
      </div>`;
    });
    html+=`</div></div>`;
  });
  body.innerHTML=html;
}

  }
});

// ═══════════════════════════════════════════════════════
//  NAVIGATION & INTERACTION
// ═══════════════════════════════════════════════════════
function goToZone(zoneName){
  const z=zoneData.find(z=>z.name===zoneName);
  if(!z)return;
  map.flyToBounds(z.bounds.pad(0.15),{duration:0.8});
  setTimeout(()=>{
    z.polygon.openPopup();
    // Flash highlight
    const orig={fillColor:z.fillColor,fillOpacity:z.fillOpacity};
    z.polygon.setStyle({fillColor:'#ffeb3b',fillOpacity:0.75});
    setTimeout(()=>z.polygon.setStyle(orig),1600);
  },900);
}

function goToCity(cityName,event){
  if(event)event.stopPropagation();
  const cd=cityData[cityName];
  if(!cd)return;
  map.flyToBounds(cd.bounds.pad(0.12),{duration:0.8});
}

function toggleCity(cid,cityName,event){
  // If click was on city name text, navigate; otherwise toggle zones
  const zl=document.getElementById(cid);
  const arr=document.getElementById('arr-'+cid);
  if(!zl)return;
  const isOpen=zl.classList.contains('visible');
  if(isOpen){
    zl.classList.remove('visible');
    arr.classList.remove('open');
  }else{
    zl.classList.add('visible');
    arr.classList.add('open');
    goToCity(cityName,null);
  }
}

  document.getElementById('sidebar').classList.remove('collapsed');
  document.getElementById('open-sb-btn').classList.remove('visible');
  setTimeout(()=>map.invalidateSize(),320);
}

// ═══════════════════════════════════════════════════════
//  RADIUS TOGGLE
// ═══════════════════════════════════════════════════════
function toggleRadius(){
  radiusVisible=!radiusVisible;
  const btn=document.getElementById('radius-btn');
  if(radiusVisible){
    map.addLayer(radiusLayer);
    btn.innerHTML='👁 Радіуси доставки: <b>Вкл</b>';
    btn.classList.remove('radius-off');
  }else{
    map.removeLayer(radiusLayer);
    btn.innerHTML='🚫 Радіуси доставки: <b>Вимк</b>';
    btn.classList.add('radius-off');
  }
}

// ═══════════════════════════════════════════════════════
//  PANEL TOGGLE (uncovered lists)
// ═══════════════════════════════════════════════════════
function togglePanel(id){
  const panel=document.getElementById(id);
  if(!panel)return;
  const isOpen=panel.classList.contains('open');
  // Close all panels first
  document.querySelectorAll('.sub-panel').forEach(p=>p.classList.remove('open'));
  if(!isOpen)panel.classList.add('open');
}

// ═══════════════════════════════════════════════════════
//  DARK MODE
// ═══════════════════════════════════════════════════════
function toggleTheme(){
  isDark=!isDark;
  const btn=document.getElementById('theme-btn');
  if(isDark){
    map.removeLayer(lightTiles);map.addLayer(darkTiles);
    document.body.classList.add('dark');
    btn.textContent='☀️';
  }else{
    map.removeLayer(darkTiles);map.addLayer(lightTiles);
    document.body.classList.remove('dark');
    btn.textContent='🌙';
  }
}

// ═══════════════════════════════════════════════════════
//  REFRESH DATA
// ═══════════════════════════════════════════════════════
const CSV_URL='https://docs.google.com/spreadsheets/d/e/2PACX-1vTEbcEMNJcF5H0tzqo4ZCQCzH_eYFKIzkvJhIAp0H_v6F2U2QzoYLk_1hlerVusfo98Z8MBJ3cryGtD/pub?gid=0&single=true&output=csv';

function parseCSV(text){
  const rows=[];
  const lines=text.split(/\r?\n/);
  for(const line of lines){
    if(!line.trim())continue;
    const row=[];
    let cur='',inQ=false;
    for(let i=0;i<line.length;i++){
      const ch=line[i];
      if(inQ){
        if(ch==='"'&&line[i+1]==='"'){cur+='"';i++;}
        else if(ch==='"'){inQ=false;}
        else cur+=ch;
      }else{
        if(ch==='"'){inQ=true;}
        else if(ch===','){row.push(cur);cur='';}
        else cur+=ch;
      }
    }
    row.push(cur);
    rows.push(row);
  }
  return rows;
}

function updateCoverage(){
  Object.values(cityData).forEach(c=>{c.anyCovered=false;});
  zoneData.forEach(z=>{
    z.covered=isCovered(z.name,z.centroid);
    const fillColor=z.covered?'#29b6f6':'#ef5350';
    const borderColor=z.covered?'#0277bd':'#b71c1c';
    const fillOpacity=z.covered?0.28:0.42;
    z.fillColor=fillColor;z.fillOpacity=fillOpacity;z.borderColor=borderColor;
    z.polygon.setStyle({color:borderColor,fillColor,fillOpacity});
    const cen=z.centroid;
    z.polygon.setPopupContent(`<div class="pop-wrap">
      <div class="pop-title">📍 ${z.name}</div>
      <div class="pop-row"><b>Місто:</b> ${z.city}</div>
      <div class="pop-row"><b>Центр зони:</b> ${cen[0].toFixed(4)}, ${cen[1].toFixed(4)}</div>
      <span class="pop-badge ${z.covered?'badge-ok':'badge-no'}">${z.covered?'✅ Є партнери / покриття':'❌ Без покриття'}</span>
    </div>`);
    if(z.covered&&cityData[z.city])cityData[z.city].anyCovered=true;
  });
  Object.values(cityData).forEach(c=>{c.allUncovered=!c.anyCovered;});
}

async function refreshData(){
  const btn=document.getElementById('refresh-btn');
  btn.innerHTML='⏳ Оновлення...';
  btn.disabled=true;
  try{
    const resp=await fetch(CSV_URL);
    if(!resp.ok)throw new Error('HTTP '+resp.status);
    const text=await resp.text();
    const rows=parseCSV(text);
    if(rows.length<2)throw new Error('Порожні дані');

    const hdrs=rows[0].map(h=>h.trim().toLowerCase());
    const col=name=>hdrs.findIndex(h=>h===name);
    const nameIdx=col('brand name');
    const cityIdx=col('city');
    const zoneIdx=col('zone name');
    const latIdx=col('provider lat');
    const lngIdx=col('provider lng');
    const radIdx=col('delivery radius in km');
    const custRadIdx=col('custom delivery radius in km');

    if(nameIdx<0||latIdx<0||lngIdx<0)throw new Error('Неправильний формат CSV');

    partners=rows.slice(1).map(r=>({
      name:(r[nameIdx]||'').trim(),
      city:(r[cityIdx]||'').trim(),
      zone:(r[zoneIdx]||'').trim(),
      lat:parseFloat(r[latIdx]),
      lng:parseFloat(r[lngIdx]),
      r:parseFloat((custRadIdx>=0&&r[custRadIdx]&&r[custRadIdx].trim())?r[custRadIdx]:r[radIdx])||9
    })).filter(p=>p.name&&!isNaN(p.lat)&&!isNaN(p.lng));

    // Reset brand color assignments
    Object.keys(brandColors).forEach(k=>delete brandColors[k]);
    ci=0;

    // Redraw partner markers and radii
    radiusLayer.clearLayers();
    partnerLayer.clearLayers();
    drawPartners();

    // Recalculate zone coverage
    updateCoverage();

    // Rebuild UI
    buildSidebar();
    buildUncoveredPanels();
    updateStats();

    btn.innerHTML='✅ Оновлено!';
    setTimeout(()=>{btn.innerHTML='🔄 Оновити дані';btn.disabled=false;},2500);
  }catch(e){
    console.error('refreshData:',e);
    btn.innerHTML='❌ Помилка';
    setTimeout(()=>{btn.innerHTML='🔄 Оновити дані';btn.disabled=false;},3000);
  }
}

// ═══════════════════════════════════════════════════════
//  AUTO DAILY REFRESH
// ═══════════════════════════════════════════════════════
(function(){
  const TODAY = new Date().toISOString().slice(0,10);
  const lastRefresh = localStorage.getItem('mapLastRefreshDate');
  
  function showRefreshStatus(msg){
    const el=document.getElementById('refresh-status');
    if(el){el.textContent=msg;el.style.display='block';}
  }
  
  if(lastRefresh !== TODAY){
    // Auto-refresh once per day
    setTimeout(async ()=>{
      try{
        await refreshData();
        localStorage.setItem('mapLastRefreshDate', TODAY);
        showRefreshStatus(`✅ Автооновлено ${TODAY}`);
      }catch(e){
        showRefreshStatus(`⚠ Автооновлення не вдалося`);
      }
    }, 1500);
  } else {
    showRefreshStatus(`📅 Оновлено сьогодні (${TODAY})`);
  }
  
  // Override refreshData to save date after manual refresh
  const _origRefresh = refreshData;
  window.refreshData = async function(){
    await _origRefresh();
    const now = new Date().toISOString().slice(0,10);
    localStorage.setItem('mapLastRefreshDate', now);
    showRefreshStatus(`✅ Оновлено ${now}`);
  };
})();
</script>
